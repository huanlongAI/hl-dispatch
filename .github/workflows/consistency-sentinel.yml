name: Consistency Sentinel
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  repository_dispatch:
    types: [sentinel-cascade]
  workflow_dispatch:
    inputs:
      skip_llm:
        description: 'Skip LLM review layer'
        required: false
        default: false
        type: boolean
permissions:
  contents: read
  pull-requests: write
  issues: write
jobs:
  sentinel:
    uses: huanlongAI/sentinel-shared/.github/workflows/consistency-sentinel.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      HEIYUCODE_AUTH_TOKEN: ${{ secrets.HEIYUCODE_AUTH_TOKEN }}
      HEIYUCODE_API_KEY: ${{ secrets.HEIYUCODE_API_KEY }}
    with:
      skip_llm: ${{ fromJSON(github.event.inputs.skip_llm || 'false') }}
      llm_provider: auto
      heiyucode_base_url: ${{ vars.HEIYUCODE_BASE_URL || 'https://www.heiyucode.com' }}
      heiyucode_model: ${{ vars.HEIYUCODE_MODEL || '' }}
