name: Feishu Notification

on:
  workflow_dispatch:
    inputs:
      notify_title:
        description: Manual notification title
        required: true
        type: string
      notify_url:
        description: GitHub issue, PR, run, or evidence URL
        required: true
        type: string
      notify_body:
        description: Short action-oriented notification body
        required: true
        type: string
  issues:
    types: [labeled]

jobs:
  notify-issue-task:
    if: github.event_name == 'issues' && github.event.action == 'labeled'
    runs-on: ubuntu-latest
    steps:
      - name: Issue Action Label to Engineering Channel
        env:
          ENGINEERING_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_ENGINEERING }}
          ACTION: ${{ github.event.action }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}
          LABEL_NAME: ${{ github.event.label.name }}
        run: |
          set -euo pipefail
          SUMMARY_FILE="${GITHUB_STEP_SUMMARY:-/dev/null}"

          write_delivery_ledger() {
            local route="$1"
            local recipient="$2"
            local recipient_github="$3"
            local status="$4"
            local template="$5"
            local target_url="$6"
            local preview="$7"
            local ledger_json
            ledger_json="$(jq -cn \
              --arg route "${route}" \
              --arg recipient "${recipient}" \
              --arg recipient_github "${recipient_github}" \
              --arg status "${status}" \
              --arg content_template "${template}" \
              --arg target_url "${target_url}" \
              --arg message_preview "${preview}" \
              '{
                route: $route,
                recipient: $recipient,
                recipient_github: $recipient_github,
                status: $status,
                content_template: $content_template,
                target_url: $target_url,
                message_preview: $message_preview
              }')"
            printf 'FEISHU_DELIVERY_LEDGER_JSON=%s\n' "${ledger_json}"
            {
              echo "## Feishu delivery ledger"
              echo
              echo "- route: ${route}"
              echo "- recipient: ${recipient}"
              echo "- recipient_github: ${recipient_github}"
              echo "- status: ${status}"
              echo "- content_template: ${template}"
              echo "- target_url: ${target_url}"
              echo "- message_preview:"
              echo '```text'
              printf '%s\n' "${preview}"
              echo '```'
            } >> "${SUMMARY_FILE}"
          }

          if [ "$ACTION" = "labeled" ]; then
            case "${LABEL_NAME:-}" in
              action:decision_required|decision-request)
                TITLE="Decision required"
                TEMPLATE="red"
                ;;
              action:acceptance_ready)
                TITLE="Acceptance ready"
                TEMPLATE="green"
                ;;
              action:blocker|action:p0_failure)
                TITLE="Action blocker"
                TEMPLATE="red"
                ;;
              *)
                echo "Label notification skipped: ${LABEL_NAME:-unknown} is not an action label"
                {
                  echo "## Feishu label notification skipped"
                  echo
                  echo "Reason: label is not an action notification label."
                  echo "Label: ${LABEL_NAME:-unknown}"
                  echo "Impact: group notification suppressed by policy."
                  echo "Merge gate impact: none."
                } >> "${SUMMARY_FILE}"
                exit 0
                ;;
            esac
          else
            echo "Issue notification skipped: ${ACTION:-unknown} is not an action label event"
            {
              echo "## Feishu issue notification skipped"
              echo
              echo "Reason: issue event is not an explicit action label."
              echo "Action: ${ACTION:-unknown}"
              echo "Impact: group notification suppressed by policy."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi

          WEBHOOK="${ENGINEERING_WEBHOOK:-}"
          CARD_TITLE="[hl-dispatch][工程通知] ${TITLE}"
          if [ -z "$WEBHOOK" ]; then
            echo "::warning::Feishu webhook is empty; notification skipped"
            {
              echo "## Feishu notification skipped"
              echo
              echo "Reason: webhook is empty."
              echo "Impact: notification not sent."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi

          payload="$(jq -n \
            --arg title "${CARD_TITLE}" \
            --arg template "${TEMPLATE}" \
            --arg line1 "**${ISSUE_TITLE}**" \
            --arg line2 "标签: ${ISSUE_LABELS}" \
            --arg line3 "Action label: ${LABEL_NAME}" \
            --arg url "${ISSUE_URL}" \
            '{
              msg_type: "interactive",
              card: {
                header: {title: {tag: "plain_text", content: $title}, template: $template},
                elements: [
                  {tag: "div", text: {tag: "lark_md", content: ($line1 + "\n" + $line2 + "\n" + $line3)}},
                  {tag: "action", actions: [{tag: "button", text: {tag: "plain_text", content: "查看 Issue"}, url: $url, type: "primary"}]}
                ]
              }
            }')"
          if ! response="$(curl -sS --fail-with-body -X POST "${WEBHOOK}" -H "Content-Type: application/json" -d "${payload}" 2>&1)"; then
            echo "::warning::Feishu provider request failed; notification failure is observer-only"
            {
              echo "## Feishu notification failed open"
              echo
              echo "Reason: provider request failed."
              echo "Impact: notification may be missing."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi
          echo "${response}"
          if ! echo "${response}" | jq -e '.code == 0 or .StatusCode == 0' >/dev/null; then
            echo "::warning::Feishu provider returned non-success response; notification failure is observer-only"
            {
              echo "## Feishu notification provider warning"
              echo
              echo "Reason: provider returned non-success response."
              echo "Impact: notification may be missing."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi
          issue_preview="$(printf '%s\n%s\n标签: %s\nAction label: %s\n%s' "${CARD_TITLE}" "${ISSUE_TITLE}" "${ISSUE_LABELS}" "${LABEL_NAME}" "${ISSUE_URL}")"
          write_delivery_ledger \
            "engineering_channel" \
            "AI native工程通知" \
            "n/a" \
            "sent" \
            "action_label_v1" \
            "${ISSUE_URL}" \
            "${issue_preview}"

  notify-decision-request:
    if: github.event_name == 'issues' && github.event.action == 'labeled' && (github.event.label.name == 'decision-request' || github.event.label.name == 'action:decision_required')
    runs-on: ubuntu-latest
    steps:
      - name: Decision Request to Command Channel
        env:
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_COMMAND }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          set -euo pipefail
          SUMMARY_FILE="${GITHUB_STEP_SUMMARY:-/dev/null}"

          write_delivery_ledger() {
            local route="$1"
            local recipient="$2"
            local recipient_github="$3"
            local status="$4"
            local template="$5"
            local target_url="$6"
            local preview="$7"
            local ledger_json
            ledger_json="$(jq -cn \
              --arg route "${route}" \
              --arg recipient "${recipient}" \
              --arg recipient_github "${recipient_github}" \
              --arg status "${status}" \
              --arg content_template "${template}" \
              --arg target_url "${target_url}" \
              --arg message_preview "${preview}" \
              '{
                route: $route,
                recipient: $recipient,
                recipient_github: $recipient_github,
                status: $status,
                content_template: $content_template,
                target_url: $target_url,
                message_preview: $message_preview
              }')"
            printf 'FEISHU_DELIVERY_LEDGER_JSON=%s\n' "${ledger_json}"
            {
              echo "## Feishu delivery ledger"
              echo
              echo "- route: ${route}"
              echo "- recipient: ${recipient}"
              echo "- recipient_github: ${recipient_github}"
              echo "- status: ${status}"
              echo "- content_template: ${template}"
              echo "- target_url: ${target_url}"
              echo "- message_preview:"
              echo '```text'
              printf '%s\n' "${preview}"
              echo '```'
            } >> "${SUMMARY_FILE}"
          }

          if [ -z "$WEBHOOK" ]; then
            echo "::warning::Feishu webhook is empty; notification skipped"
            {
              echo "## Feishu notification skipped"
              echo
              echo "Reason: webhook is empty."
              echo "Impact: notification not sent."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi

          payload="$(jq -n \
            --arg title "🔔 有新的裁决请求" \
            --arg line1 "**${ISSUE_TITLE}**" \
            --arg line2 "提出者: ${ISSUE_AUTHOR}" \
            --arg url "${ISSUE_URL}" \
            '{
              msg_type: "interactive",
              card: {
                header: {title: {tag: "plain_text", content: $title}, template: "red"},
                elements: [
                  {tag: "div", text: {tag: "lark_md", content: ($line1 + "\n" + $line2)}},
                  {tag: "action", actions: [{tag: "button", text: {tag: "plain_text", content: "立即查看"}, url: $url, type: "danger"}]}
                ]
              }
            }')"
          if ! response="$(curl -sS --fail-with-body -X POST "${WEBHOOK}" -H "Content-Type: application/json" -d "${payload}" 2>&1)"; then
            echo "::warning::Feishu provider request failed; notification failure is observer-only"
            {
              echo "## Feishu notification failed open"
              echo
              echo "Reason: provider request failed."
              echo "Impact: notification may be missing."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi
          echo "${response}"
          if ! echo "${response}" | jq -e '.code == 0 or .StatusCode == 0' >/dev/null; then
            echo "::warning::Feishu provider returned non-success response; notification failure is observer-only"
            {
              echo "## Feishu notification provider warning"
              echo
              echo "Reason: provider returned non-success response."
              echo "Impact: notification may be missing."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi
          decision_preview="$(printf '🔔 有新的裁决请求\n%s\n提出者: %s\n%s' "${ISSUE_TITLE}" "${ISSUE_AUTHOR}" "${ISSUE_URL}")"
          write_delivery_ledger \
            "command_channel" \
            "创始人指挥台" \
            "${ISSUE_AUTHOR}" \
            "sent" \
            "decision_request_v1" \
            "${ISSUE_URL}" \
            "${decision_preview}"

  notify-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Manual Notification
        env:
          ENGINEERING_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_ENGINEERING }}
          NOTIFY_TITLE: ${{ github.event.inputs.notify_title }}
          NOTIFY_URL: ${{ github.event.inputs.notify_url }}
          NOTIFY_BODY: ${{ github.event.inputs.notify_body }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          SUMMARY_FILE="${GITHUB_STEP_SUMMARY:-/dev/null}"

          write_delivery_ledger() {
            local route="$1"
            local recipient="$2"
            local recipient_github="$3"
            local status="$4"
            local template="$5"
            local target_url="$6"
            local preview="$7"
            local ledger_json
            ledger_json="$(jq -cn \
              --arg route "${route}" \
              --arg recipient "${recipient}" \
              --arg recipient_github "${recipient_github}" \
              --arg status "${status}" \
              --arg content_template "${template}" \
              --arg target_url "${target_url}" \
              --arg message_preview "${preview}" \
              '{
                route: $route,
                recipient: $recipient,
                recipient_github: $recipient_github,
                status: $status,
                content_template: $content_template,
                target_url: $target_url,
                message_preview: $message_preview
              }')"
            printf 'FEISHU_DELIVERY_LEDGER_JSON=%s\n' "${ledger_json}"
            {
              echo "## Feishu delivery ledger"
              echo
              echo "- route: ${route}"
              echo "- recipient: ${recipient}"
              echo "- recipient_github: ${recipient_github}"
              echo "- status: ${status}"
              echo "- content_template: ${template}"
              echo "- target_url: ${target_url}"
              echo "- message_preview:"
              echo '```text'
              printf '%s\n' "${preview}"
              echo '```'
            } >> "${SUMMARY_FILE}"
          }

          WEBHOOK="${ENGINEERING_WEBHOOK:-}"
          CARD_TITLE="[hl-dispatch][工程通知] ${NOTIFY_TITLE}"
          if [ -z "$WEBHOOK" ]; then
            echo "::warning::Feishu webhook is empty; notification skipped"
            {
              echo "## Feishu notification skipped"
              echo
              echo "Reason: webhook is empty."
              echo "Impact: notification not sent."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi

          payload="$(jq -n \
            --arg title "${CARD_TITLE}" \
            --arg line1 "${NOTIFY_BODY}" \
            --arg line2 "触发者: ${ACTOR}" \
            --arg url "${NOTIFY_URL}" \
            '{
              msg_type: "interactive",
              card: {
                header: {title: {tag: "plain_text", content: $title}, template: "blue"},
                elements: [
                  {tag: "div", text: {tag: "lark_md", content: ($line1 + "\n" + $line2)}},
                  {tag: "action", actions: [{tag: "button", text: {tag: "plain_text", content: "查看链接"}, url: $url, type: "primary"}]}
                ]
              }
            }')"
          if ! response="$(curl -sS --fail-with-body -X POST "${WEBHOOK}" -H "Content-Type: application/json" -d "${payload}" 2>&1)"; then
            echo "::warning::Feishu provider request failed; notification failure is observer-only"
            {
              echo "## Feishu notification failed open"
              echo
              echo "Reason: provider request failed."
              echo "Impact: notification may be missing."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi
          echo "${response}"
          if ! echo "${response}" | jq -e '.code == 0 or .StatusCode == 0' >/dev/null; then
            echo "::warning::Feishu provider returned non-success response; notification failure is observer-only"
            {
              echo "## Feishu notification provider warning"
              echo
              echo "Reason: provider returned non-success response."
              echo "Impact: notification may be missing."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi
          manual_preview="$(printf '%s\n%s\n触发者: %s\n%s' "${CARD_TITLE}" "${NOTIFY_BODY}" "${ACTOR}" "${NOTIFY_URL}")"
          write_delivery_ledger \
            "engineering_channel" \
            "AI native工程通知" \
            "${ACTOR}" \
            "sent" \
            "manual_dispatch_v1" \
            "${NOTIFY_URL}" \
            "${manual_preview}"
