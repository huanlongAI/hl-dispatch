name: Feishu Notification

on:
  issues:
    types: [opened, assigned, labeled, closed]
  issue_comment:
    types: [created]

jobs:
  notify-issue-task:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Issue to Task Channel
        env:
          TASK_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_TASK }}
          PM_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_PM }}
          FEISHU_BOT_APP_ID: ${{ secrets.FEISHU_BOT_APP_ID }}
          FEISHU_BOT_APP_SECRET: ${{ secrets.FEISHU_BOT_APP_SECRET }}
          ACTION: ${{ github.event.action }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ASSIGNEE: ${{ github.event.issue.assignee.login }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}
        run: |
          set -euo pipefail

          if [ "$ACTION" = "opened" ]; then
            TITLE="新 Issue"; TEMPLATE="blue"
          elif [ "$ACTION" = "assigned" ]; then
            TITLE="Issue 已指派"; TEMPLATE="orange"
          elif [ "$ACTION" = "closed" ]; then
            TITLE="Issue 已关闭"; TEMPLATE="green"
          else
            TITLE="Issue ${ACTION}"; TEMPLATE="blue"
          fi

          [ -z "$ASSIGNEE" ] && ASSIGNEE="未指派"

          if [ "$ACTION" = "assigned" ] && [ "$ASSIGNEE" != "未指派" ] && [ -n "${FEISHU_BOT_APP_ID:-}" ] && [ -n "${FEISHU_BOT_APP_SECRET:-}" ]; then
            DIRECT_OPEN_ID="$(
              ruby -ryaml -e '
                assignee = ENV.fetch("ASSIGNEE", "").downcase
                team = YAML.load_file("TEAM.yml")
                entries = []
                team.fetch("roles").each do |role_id, role|
                  next unless role.is_a?(Hash)
                  entries << role.merge("role" => role_id)
                  Array(role["members"]).each do |member|
                    entries << member.merge("role" => role_id) if member.is_a?(Hash)
                  end
                end
                entry = entries.find { |item| item["github"].to_s.downcase == assignee }
                status = entry ? entry["status"].to_s : ""
                exit 0 if entry.nil? || status.match?(/vacant|pending|departed|inactive|离职|清理|不作为|待确认/i)
                lark = entry["lark"]
                puts lark["open_id"] if lark.is_a?(Hash) && lark["open_id"].to_s.start_with?("ou_")
              '
            )"

            if [ -n "${DIRECT_OPEN_ID:-}" ]; then
              token_payload="$(jq -n \
                --arg app_id "${FEISHU_BOT_APP_ID}" \
                --arg app_secret "${FEISHU_BOT_APP_SECRET}" \
                '{app_id: $app_id, app_secret: $app_secret}')"
              token_response="$(curl -sS --fail-with-body -X POST "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal" -H "Content-Type: application/json" -d "${token_payload}")"
              tenant_token="$(echo "${token_response}" | jq -er '.tenant_access_token')"

              message_text="$(printf '[hl-dispatch] Issue 已指派给你\n%s\n标签: %s\n%s' "${ISSUE_TITLE}" "${ISSUE_LABELS}" "${ISSUE_URL}")"
              dm_payload="$(jq -n \
                --arg receive_id "${DIRECT_OPEN_ID}" \
                --arg text "${message_text}" \
                '{receive_id: $receive_id, msg_type: "text", content: ({text: $text} | tojson)}')"
              dm_response="$(curl -sS --fail-with-body -X POST "https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=open_id" -H "Authorization: Bearer ${tenant_token}" -H "Content-Type: application/json" -d "${dm_payload}")"
              if echo "${dm_response}" | jq -e '.code == 0' >/dev/null; then
                echo "Direct message sent; skipping group webhook"
                exit 0
              fi
              echo "Direct message failed; falling back to group webhook" >&2
            fi
          fi

          WEBHOOK="${TASK_WEBHOOK:-}"
          CARD_TITLE="[hl-dispatch] ${TITLE}"
          if [[ ",${ISSUE_LABELS// /}," == *",pm,"* ]]; then
            WEBHOOK="${PM_WEBHOOK:-}"
            CARD_TITLE="[hl-dispatch][PM工作台] ${TITLE}"
          fi
          [ -n "$WEBHOOK" ] || { echo "Feishu webhook is empty"; exit 1; }

          payload="$(jq -n \
            --arg title "${CARD_TITLE}" \
            --arg template "${TEMPLATE}" \
            --arg line1 "**${ISSUE_TITLE}**" \
            --arg line2 "标签: ${ISSUE_LABELS}" \
            --arg line3 "指派: ${ASSIGNEE}" \
            --arg url "${ISSUE_URL}" \
            '{
              msg_type: "interactive",
              card: {
                header: {title: {tag: "plain_text", content: $title}, template: $template},
                elements: [
                  {tag: "div", text: {tag: "lark_md", content: ($line1 + "\n" + $line2 + "\n" + $line3)}},
                  {tag: "action", actions: [{tag: "button", text: {tag: "plain_text", content: "查看 Issue"}, url: $url, type: "primary"}]}
                ]
              }
            }')"
          response="$(curl -sS --fail-with-body -X POST "${WEBHOOK}" -H "Content-Type: application/json" -d "${payload}")"
          echo "${response}"
          echo "${response}" | jq -e '.code == 0 or .StatusCode == 0' >/dev/null

  notify-decision-request:
    if: github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'decision-request'
    runs-on: ubuntu-latest
    steps:
      - name: Decision Request to Command Channel
        env:
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_COMMAND }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          set -euo pipefail

          [ -n "$WEBHOOK" ] || { echo "Feishu webhook is empty"; exit 1; }

          payload="$(jq -n \
            --arg title "🔔 有新的裁决请求" \
            --arg line1 "**${ISSUE_TITLE}**" \
            --arg line2 "提出者: ${ISSUE_AUTHOR}" \
            --arg url "${ISSUE_URL}" \
            '{
              msg_type: "interactive",
              card: {
                header: {title: {tag: "plain_text", content: $title}, template: "red"},
                elements: [
                  {tag: "div", text: {tag: "lark_md", content: ($line1 + "\n" + $line2)}},
                  {tag: "action", actions: [{tag: "button", text: {tag: "plain_text", content: "立即查看"}, url: $url, type: "danger"}]}
                ]
              }
            }')"
          response="$(curl -sS --fail-with-body -X POST "${WEBHOOK}" -H "Content-Type: application/json" -d "${payload}")"
          echo "${response}"
          echo "${response}" | jq -e '.code == 0 or .StatusCode == 0' >/dev/null

  notify-comment:
    if: github.event_name == 'issue_comment' && github.event.action == 'created'
    runs-on: ubuntu-latest
    steps:
      - name: Comment Notification
        env:
          TASK_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_TASK }}
          PM_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_PM }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}
          COMMENTER: ${{ github.event.comment.user.login }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
        run: |
          set -euo pipefail

          WEBHOOK="${TASK_WEBHOOK:-}"
          CARD_TITLE="[hl-dispatch] Issue 新评论"
          if [[ ",${ISSUE_LABELS// /}," == *",pm,"* ]]; then
            WEBHOOK="${PM_WEBHOOK:-}"
            CARD_TITLE="[hl-dispatch][PM工作台] Issue 新评论"
          fi
          [ -n "$WEBHOOK" ] || { echo "Feishu webhook is empty"; exit 1; }

          payload="$(jq -n \
            --arg title "${CARD_TITLE}" \
            --arg line1 "**${ISSUE_TITLE}**" \
            --arg line2 "评论者: ${COMMENTER}" \
            --arg url "${COMMENT_URL}" \
            '{
              msg_type: "interactive",
              card: {
                header: {title: {tag: "plain_text", content: $title}, template: "blue"},
                elements: [
                  {tag: "div", text: {tag: "lark_md", content: ($line1 + "\n" + $line2)}},
                  {tag: "action", actions: [{tag: "button", text: {tag: "plain_text", content: "查看评论"}, url: $url, type: "primary"}]}
                ]
              }
            }')"
          response="$(curl -sS --fail-with-body -X POST "${WEBHOOK}" -H "Content-Type: application/json" -d "${payload}")"
          echo "${response}"
          echo "${response}" | jq -e '.code == 0 or .StatusCode == 0' >/dev/null
