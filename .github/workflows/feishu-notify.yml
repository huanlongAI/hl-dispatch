name: Feishu Notification

on:
  issues:
    types: [opened, assigned, labeled, closed]
  issue_comment:
    types: [created]

jobs:
  notify-issue-task:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Issue to Engineering Channel
        env:
          ENGINEERING_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_ENGINEERING }}
          FEISHU_BOT_APP_ID: ${{ secrets.FEISHU_BOT_APP_ID }}
          FEISHU_BOT_APP_SECRET: ${{ secrets.FEISHU_BOT_APP_SECRET }}
          ACTION: ${{ github.event.action }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ASSIGNEE: ${{ github.event.issue.assignee.login }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}
        run: |
          set -euo pipefail
          SUMMARY_FILE="${GITHUB_STEP_SUMMARY:-/dev/null}"

          write_delivery_ledger() {
            local route="$1"
            local recipient="$2"
            local recipient_github="$3"
            local status="$4"
            local template="$5"
            local target_url="$6"
            local preview="$7"
            {
              echo "## Feishu delivery ledger"
              echo
              echo "- route: ${route}"
              echo "- recipient: ${recipient}"
              echo "- recipient_github: ${recipient_github}"
              echo "- status: ${status}"
              echo "- content_template: ${template}"
              echo "- target_url: ${target_url}"
              echo "- message_preview:"
              echo '```text'
              printf '%s\n' "${preview}"
              echo '```'
            } >> "${SUMMARY_FILE}"
          }

          if [ "$ACTION" = "opened" ]; then
            TITLE="新 Issue"; TEMPLATE="blue"
          elif [ "$ACTION" = "assigned" ]; then
            TITLE="Issue 已指派"; TEMPLATE="orange"
          elif [ "$ACTION" = "closed" ]; then
            TITLE="Issue 已关闭"; TEMPLATE="green"
          else
            TITLE="Issue ${ACTION}"; TEMPLATE="blue"
          fi

          [ -z "$ASSIGNEE" ] && ASSIGNEE="未指派"

          if [ "$ACTION" = "assigned" ]; then
            echo "Personal progress notification is DM-only; group webhook suppressed"

            if [ "$ASSIGNEE" = "未指派" ]; then
              echo "::warning::Assigned issue has no assignee; group webhook suppressed"
              {
                echo "## Feishu personal progress notification skipped"
                echo
                echo "Reason: assigned issue has no assignee."
                echo "Impact: group notification suppressed by policy."
                echo "Merge gate impact: none."
              } >> "${SUMMARY_FILE}"
              exit 0
            fi

            if [ -z "${FEISHU_BOT_APP_ID:-}" ] || [ -z "${FEISHU_BOT_APP_SECRET:-}" ]; then
              echo "::warning::Direct message bot credentials missing; group webhook suppressed"
              {
                echo "## Feishu personal progress notification skipped"
                echo
                echo "Reason: bot credentials are missing."
                echo "Impact: group notification suppressed by policy."
                echo "Merge gate impact: none."
              } >> "${SUMMARY_FILE}"
              exit 0
            fi

            DIRECT_OPEN_ID="$(
              ruby -ryaml -e '
                require "date"
                assignee = ENV.fetch("ASSIGNEE", "").downcase
                team =
                  begin
                    YAML.load_file("TEAM.yml", permitted_classes: [Date])
                  rescue ArgumentError
                    YAML.load_file("TEAM.yml")
                  end
                entries = []
                team.fetch("roles").each do |role_id, role|
                  next unless role.is_a?(Hash)
                  entries << role.merge("role" => role_id)
                  Array(role["members"]).each do |member|
                    entries << member.merge("role" => role_id) if member.is_a?(Hash)
                  end
                end
                entry = entries.find { |item| item["github"].to_s.downcase == assignee }
                status = entry ? entry["status"].to_s : ""
                exit 0 if entry.nil? || status.match?(/vacant|pending|departed|inactive|离职|清理|不作为|待确认/i)
                lark = entry["lark"]
                puts lark["open_id"] if lark.is_a?(Hash) && lark["open_id"].to_s.start_with?("ou_")
              '
            )"

            if [ -z "${DIRECT_OPEN_ID:-}" ]; then
              echo "::warning::Direct message recipient missing open_id; group webhook suppressed"
              {
                echo "## Feishu personal progress notification skipped"
                echo
                echo "Reason: assignee has no active Feishu open_id mapping."
                echo "Impact: group notification suppressed by policy."
                echo "Merge gate impact: none."
              } >> "${SUMMARY_FILE}"
              exit 0
            fi

            token_payload="$(jq -n \
              --arg app_id "${FEISHU_BOT_APP_ID}" \
              --arg app_secret "${FEISHU_BOT_APP_SECRET}" \
              '{app_id: $app_id, app_secret: $app_secret}')"
            if ! token_response="$(curl -sS --fail-with-body -X POST "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal" -H "Content-Type: application/json" -d "${token_payload}" 2>&1)"; then
              echo "::warning::Direct message token request failed; group webhook suppressed"
              {
                echo "## Feishu personal progress notification skipped"
                echo
                echo "Reason: bot token request failed."
                echo "Impact: group notification suppressed by policy."
                echo "Merge gate impact: none."
              } >> "${SUMMARY_FILE}"
              exit 0
            elif ! tenant_token="$(echo "${token_response}" | jq -er '.tenant_access_token' 2>/dev/null)"; then
              echo "::warning::Direct message token parse failed; group webhook suppressed"
              {
                echo "## Feishu personal progress notification skipped"
                echo
                echo "Reason: bot token response did not include tenant_access_token."
                echo "Impact: group notification suppressed by policy."
                echo "Merge gate impact: none."
              } >> "${SUMMARY_FILE}"
              exit 0
            else
              message_text="$(printf '[hl-dispatch] Issue 已指派给你\n%s\n标签: %s\n%s' "${ISSUE_TITLE}" "${ISSUE_LABELS}" "${ISSUE_URL}")"
              dm_payload="$(jq -n \
                --arg receive_id "${DIRECT_OPEN_ID}" \
                --arg text "${message_text}" \
                '{receive_id: $receive_id, msg_type: "text", content: ({text: $text} | tojson)}')"
              if ! dm_response="$(curl -sS --fail-with-body -X POST "https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=open_id" -H "Authorization: Bearer ${tenant_token}" -H "Content-Type: application/json" -d "${dm_payload}" 2>&1)"; then
                echo "::warning::Direct message provider request failed; group webhook suppressed"
                {
                  echo "## Feishu personal progress notification failed open"
                  echo
                  echo "Reason: provider request failed."
                  echo "Impact: group notification suppressed by policy."
                  echo "Merge gate impact: none."
                } >> "${SUMMARY_FILE}"
                exit 0
              elif echo "${dm_response}" | jq -e '.code == 0' >/dev/null; then
                echo "Direct message sent; skipping group webhook"
                write_delivery_ledger \
                  "direct_message" \
                  "node-c 技术合伙人" \
                  "${ASSIGNEE}" \
                  "sent" \
                  "assigned_issue_v1" \
                  "${ISSUE_URL}" \
                  "${message_text}"
                exit 0
              else
                echo "::warning::Direct message provider returned non-success response; group webhook suppressed"
                {
                  echo "## Feishu personal progress notification provider warning"
                  echo
                  echo "Reason: provider returned non-success response."
                  echo "Impact: group notification suppressed by policy."
                  echo "Merge gate impact: none."
                } >> "${SUMMARY_FILE}"
                exit 0
              fi
            fi
          fi

          WEBHOOK="${ENGINEERING_WEBHOOK:-}"
          CARD_TITLE="[hl-dispatch][工程通知] ${TITLE}"
          if [ -z "$WEBHOOK" ]; then
            echo "::warning::Feishu webhook is empty; notification skipped"
            {
              echo "## Feishu notification skipped"
              echo
              echo "Reason: webhook is empty."
              echo "Impact: notification not sent."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi

          payload="$(jq -n \
            --arg title "${CARD_TITLE}" \
            --arg template "${TEMPLATE}" \
            --arg line1 "**${ISSUE_TITLE}**" \
            --arg line2 "标签: ${ISSUE_LABELS}" \
            --arg line3 "指派: ${ASSIGNEE}" \
            --arg url "${ISSUE_URL}" \
            '{
              msg_type: "interactive",
              card: {
                header: {title: {tag: "plain_text", content: $title}, template: $template},
                elements: [
                  {tag: "div", text: {tag: "lark_md", content: ($line1 + "\n" + $line2 + "\n" + $line3)}},
                  {tag: "action", actions: [{tag: "button", text: {tag: "plain_text", content: "查看 Issue"}, url: $url, type: "primary"}]}
                ]
              }
            }')"
          if ! response="$(curl -sS --fail-with-body -X POST "${WEBHOOK}" -H "Content-Type: application/json" -d "${payload}" 2>&1)"; then
            echo "::warning::Feishu provider request failed; notification failure is observer-only"
            {
              echo "## Feishu notification failed open"
              echo
              echo "Reason: provider request failed."
              echo "Impact: notification may be missing."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi
          echo "${response}"
          if ! echo "${response}" | jq -e '.code == 0 or .StatusCode == 0' >/dev/null; then
            echo "::warning::Feishu provider returned non-success response; notification failure is observer-only"
            {
              echo "## Feishu notification provider warning"
              echo
              echo "Reason: provider returned non-success response."
              echo "Impact: notification may be missing."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi
          issue_preview="$(printf '%s\n%s\n标签: %s\n指派: %s\n%s' "${CARD_TITLE}" "${ISSUE_TITLE}" "${ISSUE_LABELS}" "${ASSIGNEE}" "${ISSUE_URL}")"
          write_delivery_ledger \
            "engineering_channel" \
            "AI native工程通知" \
            "n/a" \
            "sent" \
            "issue_mainline_v1" \
            "${ISSUE_URL}" \
            "${issue_preview}"

  notify-decision-request:
    if: github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'decision-request'
    runs-on: ubuntu-latest
    steps:
      - name: Decision Request to Command Channel
        env:
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_COMMAND }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          set -euo pipefail
          SUMMARY_FILE="${GITHUB_STEP_SUMMARY:-/dev/null}"

          write_delivery_ledger() {
            local route="$1"
            local recipient="$2"
            local recipient_github="$3"
            local status="$4"
            local template="$5"
            local target_url="$6"
            local preview="$7"
            {
              echo "## Feishu delivery ledger"
              echo
              echo "- route: ${route}"
              echo "- recipient: ${recipient}"
              echo "- recipient_github: ${recipient_github}"
              echo "- status: ${status}"
              echo "- content_template: ${template}"
              echo "- target_url: ${target_url}"
              echo "- message_preview:"
              echo '```text'
              printf '%s\n' "${preview}"
              echo '```'
            } >> "${SUMMARY_FILE}"
          }

          if [ -z "$WEBHOOK" ]; then
            echo "::warning::Feishu webhook is empty; notification skipped"
            {
              echo "## Feishu notification skipped"
              echo
              echo "Reason: webhook is empty."
              echo "Impact: notification not sent."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi

          payload="$(jq -n \
            --arg title "🔔 有新的裁决请求" \
            --arg line1 "**${ISSUE_TITLE}**" \
            --arg line2 "提出者: ${ISSUE_AUTHOR}" \
            --arg url "${ISSUE_URL}" \
            '{
              msg_type: "interactive",
              card: {
                header: {title: {tag: "plain_text", content: $title}, template: "red"},
                elements: [
                  {tag: "div", text: {tag: "lark_md", content: ($line1 + "\n" + $line2)}},
                  {tag: "action", actions: [{tag: "button", text: {tag: "plain_text", content: "立即查看"}, url: $url, type: "danger"}]}
                ]
              }
            }')"
          if ! response="$(curl -sS --fail-with-body -X POST "${WEBHOOK}" -H "Content-Type: application/json" -d "${payload}" 2>&1)"; then
            echo "::warning::Feishu provider request failed; notification failure is observer-only"
            {
              echo "## Feishu notification failed open"
              echo
              echo "Reason: provider request failed."
              echo "Impact: notification may be missing."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi
          echo "${response}"
          if ! echo "${response}" | jq -e '.code == 0 or .StatusCode == 0' >/dev/null; then
            echo "::warning::Feishu provider returned non-success response; notification failure is observer-only"
            {
              echo "## Feishu notification provider warning"
              echo
              echo "Reason: provider returned non-success response."
              echo "Impact: notification may be missing."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi
          decision_preview="$(printf '🔔 有新的裁决请求\n%s\n提出者: %s\n%s' "${ISSUE_TITLE}" "${ISSUE_AUTHOR}" "${ISSUE_URL}")"
          write_delivery_ledger \
            "command_channel" \
            "创始人指挥台" \
            "${ISSUE_AUTHOR}" \
            "sent" \
            "decision_request_v1" \
            "${ISSUE_URL}" \
            "${decision_preview}"

  notify-comment:
    if: github.event_name == 'issue_comment' && github.event.action == 'created'
    runs-on: ubuntu-latest
    steps:
      - name: Comment Notification
        env:
          ENGINEERING_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_ENGINEERING }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}
          COMMENTER: ${{ github.event.comment.user.login }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
        run: |
          set -euo pipefail
          SUMMARY_FILE="${GITHUB_STEP_SUMMARY:-/dev/null}"

          write_delivery_ledger() {
            local route="$1"
            local recipient="$2"
            local recipient_github="$3"
            local status="$4"
            local template="$5"
            local target_url="$6"
            local preview="$7"
            {
              echo "## Feishu delivery ledger"
              echo
              echo "- route: ${route}"
              echo "- recipient: ${recipient}"
              echo "- recipient_github: ${recipient_github}"
              echo "- status: ${status}"
              echo "- content_template: ${template}"
              echo "- target_url: ${target_url}"
              echo "- message_preview:"
              echo '```text'
              printf '%s\n' "${preview}"
              echo '```'
            } >> "${SUMMARY_FILE}"
          }

          WEBHOOK="${ENGINEERING_WEBHOOK:-}"
          CARD_TITLE="[hl-dispatch][工程通知] Issue 新评论"
          if [ -z "$WEBHOOK" ]; then
            echo "::warning::Feishu webhook is empty; notification skipped"
            {
              echo "## Feishu notification skipped"
              echo
              echo "Reason: webhook is empty."
              echo "Impact: notification not sent."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi

          payload="$(jq -n \
            --arg title "${CARD_TITLE}" \
            --arg line1 "**${ISSUE_TITLE}**" \
            --arg line2 "评论者: ${COMMENTER}" \
            --arg url "${COMMENT_URL}" \
            '{
              msg_type: "interactive",
              card: {
                header: {title: {tag: "plain_text", content: $title}, template: "blue"},
                elements: [
                  {tag: "div", text: {tag: "lark_md", content: ($line1 + "\n" + $line2)}},
                  {tag: "action", actions: [{tag: "button", text: {tag: "plain_text", content: "查看评论"}, url: $url, type: "primary"}]}
                ]
              }
            }')"
          if ! response="$(curl -sS --fail-with-body -X POST "${WEBHOOK}" -H "Content-Type: application/json" -d "${payload}" 2>&1)"; then
            echo "::warning::Feishu provider request failed; notification failure is observer-only"
            {
              echo "## Feishu notification failed open"
              echo
              echo "Reason: provider request failed."
              echo "Impact: notification may be missing."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi
          echo "${response}"
          if ! echo "${response}" | jq -e '.code == 0 or .StatusCode == 0' >/dev/null; then
            echo "::warning::Feishu provider returned non-success response; notification failure is observer-only"
            {
              echo "## Feishu notification provider warning"
              echo
              echo "Reason: provider returned non-success response."
              echo "Impact: notification may be missing."
              echo "Merge gate impact: none."
            } >> "${SUMMARY_FILE}"
            exit 0
          fi
          comment_preview="$(printf '%s\n%s\n评论者: %s\n%s' "${CARD_TITLE}" "${ISSUE_TITLE}" "${COMMENTER}" "${COMMENT_URL}")"
          write_delivery_ledger \
            "engineering_channel" \
            "AI native工程通知" \
            "${COMMENTER}" \
            "sent" \
            "issue_comment_v1" \
            "${COMMENT_URL}" \
            "${comment_preview}"
