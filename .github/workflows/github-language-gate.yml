name: GitHub Language Gate

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  issues: write

jobs:
  github-language-gate:
    uses: huanlongAI/sentinel-shared/.github/workflows/github-language-gate.yml@main
    with:
      enforcement_mode: enforce
      report_comment: true
