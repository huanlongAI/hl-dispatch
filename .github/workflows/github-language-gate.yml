name: GitHub Issue / Comment Gate

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  issues: write

jobs:
  github-language-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enforce GitHub issue/comment gate
        id: language_gate
        continue-on-error: true
        run: python3 scripts/check-github-language-gate.py --event-path "$GITHUB_EVENT_PATH" --github-output "$GITHUB_OUTPUT"

      - name: Report GitHub issue/comment gate violation
        if: steps.language_gate.outcome == 'failure' && steps.language_gate.outputs.target_issue_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GATE_ERRORS: ${{ steps.language_gate.outputs.errors }}
          GATE_TARGET_URL: ${{ steps.language_gate.outputs.target_url }}
          ISSUE_NUMBER: ${{ steps.language_gate.outputs.target_issue_number }}
        run: |
          cat > "$RUNNER_TEMP/github-language-gate-comment.md" <<EOF
          ## GitHub Issue / Comment 门禁未通过

          检测目标：$GATE_TARGET_URL

          错误码：$GATE_ERRORS

          请将 Issue 标题、正文或评论补充中文说明后重新编辑。英文术语可以保留，但不能提交纯英文内容。

          如果评论使用 `<!-- ai-output:v1 -->`，请补齐类型、结论、依据、当前状态、下一步唯一动作、需要人处理、不确定项，并确保判断词带证据。
          EOF
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file "$RUNNER_TEMP/github-language-gate-comment.md"

      - name: Fail GitHub issue/comment gate
        if: steps.language_gate.outcome == 'failure'
        run: exit 1
