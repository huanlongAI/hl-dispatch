# 唤龙平台 hl-dispatch 团队角色映射
# Cowork 通过此文件自动识别"派给运维" → 对应 GitHub 用户名
# 新增成员时在此文件添加即可，所有 session 自动生效

## github 字段为空时，通过内部渠道联系
## 成员接受邀请后，回填 github 用户名
## 本文件仅保留公开安全的角色代号，不存放实名或邮箱

## 当前能力包流参考 TEAM-COLLAB-SPEC v2.1。
## R-034 / Gate-3 条目仅保留为 legacy 派发兼容，不代表独立 QA 团队。
roles:
  founder:
    name: L0-Founder
    github: tongzhenghui
    responsibility: 创建 Issue/PR、合并裁决、最终审批

  architect:
    name: Gate-H
    github: xujiuming
    responsibility: 架构设计审查、契约变更审查、代码规范审查、Gate H 技术验收
    labels: [architect, doc-review]

  ops:
    name: Gate-R
    github: ZDragonMeta
    responsibility: 基础设施审查、部署配置、环境搭建、OPS 执行、Gate R 运维验收
    labels: [ops, task-assign]

  pm:
    name: PM-Ops
    github: jianchengl
    responsibility: 项目管理、进度跟踪、资源协调（R-034 S0 入职、WS-C 项目负责人）
    labels: [task-assign, doc-review]

  product:
    name: PM-A
    github: zoucong121
    responsibility: 产品经理（暂不参与旧系统改造，后续另行分工）
    labels: [doc-review, decision-request]

  qa-owner:
    name: QA-Owner
    github: ""
    responsibility: QA 独立质量 Owner · qa-verdict required status check 按钮权；GitHub handle 待身份映射确认
    labels: [doc-review, task-assign]

  qa-team:
    name: QA-Team
    github: ""
    responsibility: QA 验收执行团队 · acceptance-manifest / 验收测试 / Evidence Pack / 回归基线维护；成员 handles 待补齐
    labels: [doc-review, task-assign]

  java-qa:
    name: Gate-3
    github: LUXBYA
    responsibility: LEGACY R-034 Gate-3 · Java 工程师 / 技术验收官；不得作为 TEAM-COLLAB v2.1 QA 团队或 qa-verdict Owner 的默认派发目标
    labels: [doc-review, task-assign]

  backend:
    name: Infra-A
    github: wp159951
    responsibility: 后端核心开发（Keycloak 集成 / Nacos / MQ Starter / HK Client SDK）
    labels: [doc-review, task-assign]
