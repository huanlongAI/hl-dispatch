# 本文件是 AI 任务派发用内部通讯录，不同步到 GitHub Pages 公示站点
# Cowork 通过此文件自动识别"派给运维" → 对应 GitHub 用户名和飞书 ID
# 新增成员时在此文件添加即可，所有 session 自动生效

# github 字段为空时，通过内部渠道联系
# 成员接受邀请后，回填 github 用户名
# 本文件仅保留角色代号、GitHub handle、飞书 open_id/user_id，不存放邮箱
# 离职或退出协作的成员必须从 active roles 中移除，不保留 GitHub handle

