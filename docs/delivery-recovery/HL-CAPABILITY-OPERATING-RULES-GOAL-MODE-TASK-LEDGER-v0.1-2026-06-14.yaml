version: v0.1
status: DRAFT_GOAL_MODE_TASK_LEDGER
date: '2026-06-14'
scope: hl-dispatch/docs/delivery-recovery goal-mode execution tracking only
goal_id: hl_capability_operating_rules_remaining_task_closure
objective: 制定唤龙能力包运行规则剩余阶段的全部任务，并形成目标模式执行闭环计划
readable_plan_ref: docs/delivery-recovery/HL-CAPABILITY-OPERATING-RULES-REMAINING-TASK-CLOSURE-v0.1-2026-06-14.md
ledger_ref: docs/delivery-recovery/CAPABILITY-READINESS-LEDGER-v0.1.yaml
non_authorization_boundary:
  - This task ledger is not a contract registry.
  - This task ledger is not a runtime registry.
  - This task ledger does not authorize runtime, schema, registry, manifest, config, OpenAPI, events, facts, reasoncodes, production, release, MVP, active contract, live data, or live business operation.
  - This task ledger does not authorize payment, refund, settlement, billing, entitlement, identity/privacy, customer asset, sales order, provider, service order, booking object, or other formal business object mutation.
  - SSOT remains in hl-contracts for contracts and in hl-platform for runtime.
review_first: true
founder_decision_required_for:
  - any change outside hl-dispatch/docs/delivery-recovery/
  - any hl-contracts change
  - any hl-platform change
  - runtime implementation
  - schema / registry / manifest / config mutation
  - OpenAPI / events / facts / reasoncodes mutation
  - production / release / MVP / active contract claim
  - live data or live business operation
  - Gateway / HK Kernel / Can -> Action -> Audit bypass
execution_policy:
  default_branch: origin/main
  branch_prefix: codex/
  unit: one bounded PR per task unless a task explicitly allows a tightly coupled pair
  push_requires_founder_confirmation: true
  draft_pr_requires_founder_confirmation: true
  merge_requires_founder_confirmation: true
  allowed_path:
    - docs/delivery-recovery/
  forbidden_repositories:
    - hl-contracts
    - hl-platform
  required_local_validation:
    - git diff --check
    - path scope check only under docs/delivery-recovery/
    - Ledger YAML parse if Ledger is touched
    - required boundary keyword check
    - scripts/test-github-language-gate.py
    - scripts/test-action-projection-exporter.py
required_keywords:
  - Boundary
  - Not Authorized
  - Review-first
  - Founder decision required
  - Gateway / HK Kernel / Can -> Action -> Audit
status_values:
  - not_started
  - in_progress
  - pr_open
  - merged
  - deferred
  - blocked_needs_founder_gate
task_defaults:
  current_status: not_started
  authorized_scope: docs_only_dispatch
  contract_authorization: not_authorized
  runtime_authorization: not_authorized
  production_authorization: not_authorized
  active_contract_authorization: not_authorized
tasks:
  - task_id: BF-01-HUMAN-END
    phase: Phase 3/4
    capability_id: biz.booking.fulfillment
    objective: Close Human End docs gap.
    owner: PM-A / 邹骢
    reviewer: Gate-H / 许久明
    depends_on:
      - BIZ-BOOKING-FULFILLMENT-DOCS-PATCH-PLANNING-v0.1-2026-06-14
    output_files:
      - docs/delivery-recovery/BIZ-BOOKING-FULFILLMENT-HUMAN-END-PATCH-PACKET-v0.1-2026-06-14.md
    minimum_evidence:
      - NUI intent entry surface
      - GUI state anchor
      - confirmation surface
      - review surface
      - audit surface
      - exception handling surface
      - deterministic non-chat controls
      - failure path
    done_when:
      - output file merged on origin/main
      - Boundary and Not Authorized sections present
      - human confirmation thresholds recorded
      - runtime and contract remain not authorized

  - task_id: BF-02-AGENT-END
    phase: Phase 3/4
    capability_id: biz.booking.fulfillment
    objective: Close Agent End readiness criteria gap.
    owner: Gate-H / 许久明
    reviewer: PM-A / 邹骢
    depends_on:
      - BF-01-HUMAN-END
    output_files:
      - docs/delivery-recovery/BIZ-BOOKING-FULFILLMENT-AGENT-END-PATCH-PACKET-v0.1-2026-06-14.md
    minimum_evidence:
      - tool discovery
      - tool pruning profile
      - context budget
      - pagination rule
      - evidence summarization
      - schema preservation
      - Can before Action
      - Action rechecks Can
    done_when:
