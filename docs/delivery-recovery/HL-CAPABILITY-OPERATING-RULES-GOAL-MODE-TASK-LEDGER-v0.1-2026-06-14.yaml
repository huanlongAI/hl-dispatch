  - task_id: BF-04-OVERRIDE-RETRY
    phase: Phase 3/4
    capability_id: biz.booking.fulfillment
    objective: Close override owner matrix, approval_ref, retry, duplicate, and idempotency policy gaps.
    owner: Gate-H / 许久明
    reviewer: PM-A / 邹骢
    depends_on:
