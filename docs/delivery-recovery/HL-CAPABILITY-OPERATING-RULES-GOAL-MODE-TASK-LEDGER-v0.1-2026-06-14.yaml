      - Agent cannot hold final booking decision authority
      - Gateway bypass is explicitly blocked

  - task_id: BF-03-GATEWAY-CAN-AUDIT
    phase: Phase 3/4
    capability_id: biz.booking.fulfillment
    objective: Close Gateway / Can / Action / Audit trace gap.
    owner: Gate-H / 许久明
    reviewer: PM-A / 邹骢
    depends_on:
      - BF-02-AGENT-END
    output_files:
      - docs/delivery-recovery/BIZ-BOOKING-FULFILLMENT-GATEWAY-CAN-AUDIT-PATCH-PACKET-v0.1-2026-06-14.md
    minimum_evidence:
      - fail-secure behavior
      - denied Can no-mutation rule
      - event_id preservation
      - trace_id preservation
      - reason_code preservation
      - audit_ref preservation
    done_when:
