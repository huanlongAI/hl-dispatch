completion_audit:
  required_before_goal_complete:
    - readable plan exists and is linked from README and implementation plan
    - YAML task ledger parses
    - all 18 tasks exist with owner, reviewer, dependency, output, minimum_evidence, and done_when
    - no task authorizes runtime, contract, production, MVP, active contract, live data, or live business operation
    - current branch diff stays under docs/delivery-recovery/
    - local checks pass
    - plan is pushed, Draft PR is created, checks pass, and PR is merged to origin/main
  current_status: local_plan_prepared_ready_for_push_confirmation
  next_required_confirmation: 推送确认：批准推送
  current_open_pr_conflict_check:
    checked_at: '2026-06-14'
    result: no_docs_delivery_recovery_path_conflict_found
    observed_open_prs:
      - pr: https://github.com/huanlongAI/hl-dispatch/pull/261
        path_touched: .sentinel/config.yaml
        conflicts_with_this_task: false
